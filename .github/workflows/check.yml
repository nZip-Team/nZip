name: Check

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: Core/go.mod

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Build core
        run: bun run build:core

      - name: Trigger Release workflow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Release ')
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'run-release',
              client_payload: {
                sha: context.sha,
                ref: context.ref,
                message: context.payload.head_commit?.message || ''
              }
            })
