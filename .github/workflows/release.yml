name: Release nZip

on:
  repository_dispatch:
    types: [run-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.sha || github.sha }}

      - name: Parse release commit message
        id: parse_release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            COMMIT_MESSAGE="${{ github.event.client_payload.message }}"
          else
            COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          fi

          # Use only the first line to avoid body text affecting the parser.
          COMMIT_MESSAGE="$(echo "$COMMIT_MESSAGE" | tr -d '\r' | head -n1)"

          if [[ "$COMMIT_MESSAGE" =~ ^Release[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+),[[:space:]]+(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            NOTE="${BASH_REMATCH[2]}"
            TAG="v$VERSION"

            echo "matched=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "title=$TAG" >> "$GITHUB_OUTPUT"
            echo "note=$NOTE" >> "$GITHUB_OUTPUT"
            echo "Release message matched. Preparing release for $VERSION."
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo "Commit message did not match expected format: Release x.y.z, description"
          fi

      - name: Sync package version
        if: steps.parse_release.outputs.matched == 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.parse_release.outputs.version }}
          TARGET_REF: ${{ github.event.client_payload.ref || github.ref }}
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(node -e "console.log(require('./package.json').version)")"
          if [[ "$CURRENT_VERSION" == "$RELEASE_VERSION" ]]; then
            echo "package.json version already matches $RELEASE_VERSION"
            exit 0
          fi

          echo "Updating package.json version from $CURRENT_VERSION to $RELEASE_VERSION"

          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version=process.env.RELEASE_VERSION; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json
          if git diff --cached --quiet; then
            echo "No package.json changes to commit"
            exit 0
          fi

          git commit -m "Bump version to $RELEASE_VERSION"

          TARGET_BRANCH="${TARGET_REF#refs/heads/}"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Check whether tag already exists
        id: tag_check
        if: steps.parse_release.outputs.matched == 'true'
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.parse_release.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists. Skipping release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.parse_release.outputs.matched == 'true' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.parse_release.outputs.tag }}
          name: ${{ steps.parse_release.outputs.title }}
          generate_release_notes: true
